name: Build & Simulate

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys nextpnr-ice40 iverilog
      - name: Synthesize
        run: make -C hardware/synth synth_ice40
      - name: Simulate
        run: make -C hardware/sim
